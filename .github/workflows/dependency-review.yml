name: Dependency Review

on:
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: dependency review
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/dependency-review-action@v4
